<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, minimal-ui">
    <title>{% block title %}{% endblock %}</title>

    <!-- Logo Icono -->
    <link rel="shortcut icon" href="{{ url_for('static',filename='img/web/logo.png')}}">

    <script src="https://kit.fontawesome.com/83abc70219.js" crossorigin="anonymous"></script>

    <link rel="icon" href="{{url_for('static', filename='images/favicon.ico')}}" type="image/x-icon">
    <!-- Google font-->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,600" rel="stylesheet">
    <!-- Style.css Plantilla -->
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='css/style.css')}}">
    <!-- BOOSTSTRAP 5 -->
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='css/custom.css')}}">
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename='css/style1.css')}}">

    <script src="https://code.jquery.com/jquery-2.1.3.min.js"></script>
    
    
</head>

<body>

    <!-- Nav -->
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark" id="navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{url_for('home')}}">
                <img src="{{ url_for('static',filename='img/web/logo.png')}}" alt="" width="50">
                UCE MINING
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                {% if user %}
                <ul class="navbar-nav ms-auto navbar-text">
                    <li class="p-1 nav-item"><a class="nav-link" aria-current="page" href="{{url_for('home')}}">Home</a>
                    </li>
                    <li class="p-1 nav-item"><a class="nav-link" href="{{url_for('perfil_rec')}}">Perfil</a></li>
                    <li class="p-1 nav-item"><a class="nav-link" href="{{url_for('logout')}}">Cerrar Sesión</a></li>
                </ul>
                {% else %}
                <ul class="navbar-nav ms-auto navbar-text">
                    <li class="p-1 nav-item"><a class="nav-link" aria-current="page" href="{{url_for('home')}}">Home</a>
                    </li>
                    <li class="p-1 nav-item"><a class="nav-link" href="{{url_for('about')}}">Sobre Nosotros</a></li>
                    <li class="p-1 nav-item"><a class="nav-link" href="{{url_for('register')}}">Registrarse</a></li>
                    <li class="p-1 nav-item"><a class="nav-link" href="{{url_for('login')}}">Iniciar Sesión</a></li>

                </ul>
                {% endif %}
            </div>
        </div>
    </nav>
    <main>
        <div class="row">
            <div class="col-12 m-0 p-0">
                {% for message in get_flashed_messages() %}
                <div class="alert alert-info alert-dismissible fade show" role="alert">
                    <strong>¡ACCIÓN REALIZADA! </strong>{{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
            </div>
        </div>

        {% block content %}{% endblock %}
    </main>

    <!-- Modal ? -->
    <div class="modal fade" id="upload" tabindex="-1" role="dialog" aria-labelledby="modal1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal1">Subir Imagen</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form action="{{url_for('perfil', username = username)}}" method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
                    <div class="modal-body">
                        <ul class="pcoded-submenu">
                            <div class="form-group row">
                                <label class="col-sm-2 col-form-label"> Subir Archivo </label>
                                <div class="col-sm-10">
                                    <input type="file" name="archivo" accept=".jpeg">
                                </div>
                            </div>
                            <div class="modal-footer">
                                <input type="submit" class="btn btn-primary" value="Subir">
                                <button type="button" class="btn btn-warning" data-bs-dismiss="modal">Close</button>
                            </div>
                        </ul>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- Modal end  -->
    <!-- Custom js BOOSTSTRAP 5 -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.6.0/dist/umd/popper.min.js"
        integrity="sha384-KsvD1yqQ1/1+IA7gi3P0tyJcT3vR+NdBTt13hSJ2lnve8agRGXTTyNaBYmCR/Nwi"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.min.js"
        integrity="sha384-nsg8ua9HAw1y0W1btsyWgBklPnCUAFLuTMS2G72MMONqmOymq585AcH49TLBQObG"
        crossorigin="anonymous"></script>

    <!-- METAREFERENCIAS PARA ESTILO -->
    

</body>

</html>
